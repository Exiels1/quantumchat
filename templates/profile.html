{% extends 'base.html' %}
{% block content %}
<div class="auth-root">
  <div class="auth-card" style="max-width:460px">

    <div class="profile-avatar-wrap">
      {% if current_user.avatar %}
        <img src="{{ current_user.avatar }}" class="profile-avatar-img" id="avatarPreview" alt="avatar"/>
      {% else %}
        <div class="profile-avatar-init" id="avatarPreview">{{ current_user.username[0].upper() }}</div>
      {% endif %}
      <div class="avatar-overlay" onclick="document.getElementById('avatarInput').click()">Change</div>
    </div>

    <h1 class="auth-title" style="margin-top:14px">{{ current_user.username }}</h1>
    <p class="auth-sub">Edit your profile</p>

    <form method="post" enctype="multipart/form-data" class="auth-form">
      <input type="file" id="avatarInput" name="avatar" accept="image/*" style="display:none"/>
      <div class="field">
        <label>Status</label>
        <input name="status" value="{{ current_user.status or '' }}" maxlength="120" placeholder="What's your vibe?"/>
      </div>
      <div class="field">
        <label>Bio</label>
        <textarea name="bio" maxlength="220" placeholder="Tell people about yourself..." rows="3" style="background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:10px;padding:12px 14px;color:var(--text);font-family:inherit;font-size:14px;outline:none;resize:none;transition:border-color 0.2s;width:100%">{{ current_user.bio or '' }}</textarea>
      </div>
      <button type="submit" class="btn-primary">Save Changes</button>
    </form>

    <div class="auth-links">
      <a href="{{ url_for('inbox') }}">Back to chats</a>
      <a href="{{ url_for('logout') }}">Logout</a>
    </div>
  </div>
</div>

<style>
.profile-avatar-wrap { position:relative;width:90px;height:90px;margin:0 auto;cursor:pointer; }
.profile-avatar-img  { width:90px;height:90px;border-radius:50%;object-fit:cover;border:2px solid var(--border2);display:block; }
.profile-avatar-init { width:90px;height:90px;border-radius:50%;background:linear-gradient(135deg,var(--red),var(--blue));display:flex;align-items:center;justify-content:center;font-size:34px;font-weight:800;color:#fff;border:2px solid var(--border2); }
.avatar-overlay      { position:absolute;inset:0;border-radius:50%;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:#fff;opacity:0;transition:opacity 0.2s; }
.profile-avatar-wrap:hover .avatar-overlay { opacity:1; }
</style>

<script>
document.getElementById('avatarInput').addEventListener('change', function() {
  if (this.files[0]) {
    const reader = new FileReader();
    reader.onload = e => {
      const prev = document.getElementById('avatarPreview');
      prev.outerHTML = `<img src="${e.target.result}" class="profile-avatar-img" id="avatarPreview" alt="avatar"/>`;
    };
    reader.readAsDataURL(this.files[0]);
  }
});
</script>
{% endblock %}
